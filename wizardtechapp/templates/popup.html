{% load static %}
<section class="loginpage">
    <div class="slogin">
        <div class="leftside"><img src="{% static 'img/studentloging-removebg-preview.png' %}" alt=""></div>
        <div class="rightside">
            <h1>Student Login</h1>
            <div class="cut"><i class="fa-solid fa-xmark"></i></div>
            <div class="log-img"><i class="fa-regular fa-user"></i></div>
            <table>
                <tr>
                    <td><label for="">Reg. No</label><input type="text" placeholder="Registration Number"
                            class="login-input"></td>
                </tr>
                <tr>
                    <td><label for="">Password</label><input type="text" placeholder="Password"
                            class="login-input">></td>
                </tr>
                <tr>

                    <td>
                        <div class="remember"><span><input type="checkbox"> Remember me</span> <span><a href="#"
                                    style="color: red;">Forget Password ?</a></span></div>
                    </td>
                </tr>
                <tr>
                    <td><button><i class="fa-solid fa-arrow-right-to-bracket"></i> &nbsp;LOGIN</button></td>
                </tr>

            </table>
            <p>Don't have any account ?</p>
            <p><a href="#">Create an account</a></p>
        </div>
    </div>
</section>
<section class="center-login">
    <div class="slogin">
        <div class="leftside"><img src="{% static 'img/centerlogin-removebg-preview.png' %}" alt=""></div>
        <div class="rightside">
            <h1>Center Login</h1>
            <div class="cut-center"><i class="fa-solid fa-xmark"></i></div>
            <div class="log-img"><i class="fa-solid fa-user-lock"></i></div>
            <table>
                <tr>
                    <td><label for="">Username</label><input type="text" placeholder="Username"
                            class="login-input"></td>
                </tr>
                <tr>
                    <td><label for="">Password</label><input type="text" placeholder="Password"
                            class="login-input">></td>
                </tr>
                <tr>

                    <td>
                        <div class="remember"><span><input type="checkbox"> Remember me</span> <span><a href="#"
                                    style="color: rgb(37, 18, 142);">Forget Password ?</a></span></div>
                    </td>
                </tr>
                <tr>
                    <td><button><i class="fa-solid fa-arrow-right-to-bracket"></i> &nbsp;LOGIN</button></td>
                </tr>

            </table>
        </div>
    </div>
</section>
<script>
    $(function () {
        $('.student-login').click(function () {
            $('.loginpage').css({ 'scale': '1' })
        })
        $('.cut').click(function () {
            $('.loginpage').css({ 'scale': '0' })
        })
    });
    $(function () {
        $('#center-login').click(function () {
            $('.center-login').css({ 'scale': '1' })
        })
        $('.cut-center').click(function () {
            $('.center-login').css({ 'scale': '0' })
        })
    })
</script>
